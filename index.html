<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soluções Eficazes — Launcher</title>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-main: #F8FAFC;
      --text-main: #0F172A;
      --text-muted: #64748B;
      --accent: #1E40AF;
      --accent-light: #3B82F6;
      --card-bg: #FFFFFF;
      --card-border: #E2E8F0;
      --card-hover: #F1F5F9;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-main);
      color: var(--text-main);
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .header {
      margin-bottom: 30px;
    }

    .logo-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .logo-mark {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      border-radius: 10px;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 20px;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px;
      border: 1px solid var(--card-border);
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      background: var(--card-bg);
      transition: 0.2s;
    }

    .card:hover {
      background: var(--card-hover);
    }

    .card-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(109,40,217,0.1);
    }

    .card-title {
      font-weight: 600;
      font-size: 14px;
    }

    .card-url {
      font-size: 12px;
      color: var(--text-muted);
    }
  </style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="logo-row">
      <div class="logo-mark">SE</div>
      <div>
        <div><strong>Soluções Eficazes</strong></div>
        <div style="font-size:12px;color:#64748B;">Launcher</div>
      </div>
    </div>
  </div>

  <div class="cards">

    <!-- DEI ATUALIZADO -->
    <a class="card" href="https://dei.solucoeseficazes.pt/" target="_blank" rel="noopener">
      <div class="card-icon">📊</div>
      <div>
        <div class="card-title">DEI</div>
        <div class="card-url">Indicador Diário de Atividade Económica</div>
      </div>
    </a>

    <a class="card" href="https://credium.solucoeseficazes.pt/" target="_blank">
      <div class="card-icon">💳</div>
      <div>
        <div class="card-title">Credium Prime</div>
        <div class="card-url">credium.solucoeseficazes.pt</div>
      </div>
    </a>

    <a class="card" href="https://quotalis.solucoeseficazes.pt/" target="_blank">
      <div class="card-icon">🏠</div>
      <div>
        <div class="card-title">Quotalis</div>
        <div class="card-url">quotalis.solucoeseficazes.pt</div>
      </div>
    </a>

    <a class="card" href="https://combustivel.solucoeseficazes.pt/" target="_blank">
      <div class="card-icon">⛽</div>
      <div>
        <div class="card-title">Gestão de Combustível</div>
        <div class="card-url">combustivel.solucoeseficazes.pt</div>
      </div>
    </a>

  </div>

</div>

</body>
</html>
